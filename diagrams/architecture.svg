<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sixth Street S3 Event Processor Architecture</title>
  <desc id="desc">A user uploads a single-line file to S3, S3 invokes Lambda, Lambda reads the object using IAM permissions, then writes logs to CloudWatch.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
  <rect x="20" y="20" width="1160" height="635" rx="22" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="600" y="62" font-family="Arial" font-size="28" text-anchor="middle" font-weight="700">Sixth Street Assessment: S3 Event Processor</text>
  <rect x="70" y="135" width="180" height="95" rx="14" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="160" y="174" font-family="Arial" font-size="18" text-anchor="middle" font-weight="700">Producer</text>
  <text x="160" y="202" font-family="Arial" font-size="14" text-anchor="middle">aws s3 cp / app upload</text>
  <rect x="340" y="130" width="230" height="110" rx="14" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="455" y="170" font-family="Arial" font-size="18" text-anchor="middle" font-weight="700">S3 Landing Bucket</text>
  <text x="455" y="198" font-family="Arial" font-size="14" text-anchor="middle">prefix: inbound/</text>
  <text x="455" y="218" font-family="Arial" font-size="14" text-anchor="middle">versioned, encrypted, private</text>
  <rect x="680" y="130" width="230" height="110" rx="14" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="795" y="170" font-family="Arial" font-size="18" text-anchor="middle" font-weight="700">Lambda Processor</text>
  <text x="795" y="198" font-family="Arial" font-size="14" text-anchor="middle">Python 3.12 / ARM64</text>
  <text x="795" y="218" font-family="Arial" font-size="14" text-anchor="middle">parse one-line files</text>
  <rect x="950" y="135" width="180" height="95" rx="14" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="1040" y="174" font-family="Arial" font-size="18" text-anchor="middle" font-weight="700">CloudWatch Logs</text>
  <text x="1040" y="202" font-family="Arial" font-size="14" text-anchor="middle">success/error logs</text>
  <rect x="320" y="370" width="270" height="115" rx="14" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="455" y="410" font-family="Arial" font-size="18" text-anchor="middle" font-weight="700">Bucket Policy</text>
  <text x="455" y="438" font-family="Arial" font-size="14" text-anchor="middle">deny insecure transport</text>
  <text x="455" y="460" font-family="Arial" font-size="14" text-anchor="middle">block public access</text>
  <rect x="680" y="370" width="270" height="115" rx="14" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="815" y="410" font-family="Arial" font-size="18" text-anchor="middle" font-weight="700">IAM Role</text>
  <text x="815" y="438" font-family="Arial" font-size="14" text-anchor="middle">Lambda read-only access</text>
  <text x="815" y="460" font-family="Arial" font-size="14" text-anchor="middle">logs permissions</text>
  <line x1="250" y1="183" x2="340" y2="183" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="295" y="165" font-family="Arial" font-size="13" text-anchor="middle">PUT object</text>
  <line x1="570" y1="183" x2="680" y2="183" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="625" y="165" font-family="Arial" font-size="13" text-anchor="middle">ObjectCreated event</text>
  <line x1="795" y1="240" x2="540" y2="370" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="660" y="310" font-family="Arial" font-size="13" text-anchor="middle">GetObject</text>
  <line x1="910" y1="183" x2="950" y2="183" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="930" y="165" font-family="Arial" font-size="13" text-anchor="middle">logs</text>
  <line x1="590" y1="428" x2="680" y2="428" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="635" y="410" font-family="Arial" font-size="13" text-anchor="middle">least privilege</text>
  <text x="600" y="590" font-family="Arial" font-size="15" text-anchor="middle">CDK deploys S3, bucket policy, Lambda, notification configuration, IAM permissions, and log retention through CloudFormation.</text>
</svg>
